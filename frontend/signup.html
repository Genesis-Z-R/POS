<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Signup - Capstone POS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }
    .brand {
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-size: 2.5rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="glass-card auth-card animate-fade-in">
      <div class="brand">
        <h1>POS Flow</h1>
        <p>Create a Customer Account</p>
      </div>
      
      <form id="signupForm" style="text-align: left;">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="name" class="form-control" required placeholder="John Doe">
        </div>

        <div class="grid-2" style="margin-bottom: 1.5rem;">
            <div class="form-group mb-0">
              <label class="form-label">Email Address</label>
              <input type="email" id="email" class="form-control" required placeholder="john@example.com">
            </div>
            
            <div class="form-group mb-0">
              <label class="form-label">Phone Number (MTN MoMo)</label>
              <input type="text" id="phone" class="form-control" required placeholder="024XXXXXXX">
            </div>
        </div>
        
        <div class="grid-2">
            <div class="form-group mb-0">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>

            <div class="form-group mb-0">
              <label class="form-label">Confirm Password</label>
              <input type="password" id="confirm_password" class="form-control" required placeholder="••••••••">
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
      </form>

      <div style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) {
         window.location.href = 'index.html'; // Default handler logic
      }

      const signupForm = document.getElementById('signupForm');
      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        if (password !== confirm_password) {
            return showToast('Passwords do not match', 'error');
        }

        const btn = e.target.querySelector('button');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
        btn.disabled = true;

        try {
          const res = await fetchAPI('/auth/register', {
            method: 'POST',
            body: JSON.stringify({ name, email, phone, password })
          });
          
          setAuthData(res.token, res.user);
          showToast('Account created successfully!', 'success');
          
          setTimeout(() => {
             window.location.href = 'customer_account.html';
          }, 1000);
          
        } catch (error) {
          btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
          btn.disabled = false;
          showToast(error.message, 'error');
        }
      });
    });
  </script>
</body>
</html>

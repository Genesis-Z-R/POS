<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products & Inventory - Capstone POS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  </style>
</head>
<body>

  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header"><i class="fa-solid fa-store" style="margin-right: 10px;"></i> POS Flow</div>
      <ul class="nav-links">
        <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
        <li class="nav-item"><a href="pos.html" class="nav-link"><i class="fa-solid fa-cash-register"></i> POS Screen</a></li>
        <li class="nav-item"><a href="products.html" class="nav-link active"><i class="fa-solid fa-box"></i> Products & Inventory</a></li>
        <li class="nav-item"><a href="users.html" class="nav-link"><i class="fa-solid fa-users"></i> Users & Customers</a></li>
        <li class="nav-item"><a href="reports.html" class="nav-link"><i class="fa-solid fa-file-invoice"></i> Reports</a></li>
      </ul>
      <div style="padding: 20px;"><button class="btn btn-danger logout-btn" style="width: 100%;"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <h2>Products & Inventory</h2>
        <div class="user-profile">
          <div class="user-name-display" style="font-weight: 600;">Loading...</div>
          <div class="user-avatar user-name-display">U</div>
        </div>
      </header>

      <div class="content-wrapper animate-fade-in">
        
        <div class="header-actions">
           <div>
              <input type="text" id="searchBox" class="form-control" placeholder="Search product..." style="width: 300px; display: inline-block;">
           </div>
           <div>
              <button class="btn btn-primary" id="newProdBtn"><i class="fa-solid fa-plus"></i> Add Product</button>
           </div>
        </div>

        <div class="glass-card table-container">
          <table class="table" id="productsTable">
            <thead>
              <tr>
                <th>Barcode</th>
                <th>Product Name</th>
                <th>Category</th>
                <th>Price (GHS)</th>
                <th>Stock Qty</th>
                <th>Min. Stock</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
               <tr><td colspan="7" style="text-align: center;">Loading products...</td></tr>
            </tbody>
          </table>
        </div>

      </div>
    </main>
  </div>

  <!-- Create Product Modal -->
  <div id="productModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
      <div class="glass-card" style="width: 90%; max-width: 500px;">
          <h3 style="margin-bottom: 1.5rem;" id="modalTitle">Add New Product</h3>
          <form id="productForm">
             <input type="hidden" id="prod_id">
             <div class="form-group"><label class="form-label">Name</label><input type="text" id="prod_name" class="form-control" required></div>
             <div class="grid-2">
                 <div class="form-group"><label class="form-label">Category</label><input type="text" id="prod_cat" class="form-control"></div>
                 <div class="form-group"><label class="form-label">Price</label><input type="number" step="0.01" id="prod_price" class="form-control" required></div>
             </div>
             <div class="grid-2">
                 <div class="form-group"><label class="form-label">Barcode</label><input type="text" id="prod_barcode" class="form-control"></div>
                 <div class="form-group"><label class="form-label">Min Stock Level</label><input type="number" id="prod_min" class="form-control" value="10" required></div>
             </div>
             <div class="form-group">
                 <label class="form-label">Add to Inventory (Override)</label>
                 <input type="number" id="prod_stock" class="form-control" value="0" placeholder="Qty">
             </div>
             <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                 <button type="button" class="btn btn-secondary" onclick="document.getElementById('productModal').style.display='none'" style="flex: 1;">Cancel</button>
                 <button type="submit" class="btn btn-primary" style="flex: 1;">Save Product</button>
             </div>
          </form>
      </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const user = requireAuth(['admin', 'manager']);
      if (!user) return;

      let allProducts = [];

      async function loadProducts() {
         try {
            allProducts = await fetchAPI('/products');
            renderTable(allProducts);
         } catch(e) { showToast('Error loading products', 'error'); }
      }

      function renderTable(list) {
         const tb = document.querySelector('#productsTable tbody');
         tb.innerHTML = '';
         if(list.length === 0) return tb.innerHTML = '<tr><td colspan="7" style="text-align: center;">No products found</td></tr>';
         
         list.forEach(p => {
            const stockClass = parseInt(p.stock_quantity) < parseInt(p.minimum_stock) ? 'badge-danger' : 'badge-success';
            const tr = document.createElement('tr');
            tr.innerHTML = `
               <td>${p.barcode || '-'}</td>
               <td><strong>${p.product_name}</strong></td>
               <td>${p.category || '-'}</td>
               <td>${parseFloat(p.price).toFixed(2)}</td>
               <td><span class="badge ${stockClass}">${p.stock_quantity}</span></td>
               <td>${p.minimum_stock}</td>
               <td>
                  <button class="btn btn-secondary" onclick='editProduct(${JSON.stringify(p)})' style="padding: 0.3rem 0.6rem; font-size: 0.8rem;"><i class="fa-solid fa-pen"></i></button>
               </td>
            `;
            tb.appendChild(tr);
         });
      }

      // Search
      document.getElementById('searchBox').addEventListener('input', (e) => {
         const q = e.target.value.toLowerCase();
         renderTable(allProducts.filter(p => p.product_name.toLowerCase().includes(q) || (p.barcode && p.barcode.includes(q))));
      });

      // Actions
      const modal = document.getElementById('productModal');
      const form = document.getElementById('productForm');

      document.getElementById('newProdBtn').addEventListener('click', () => {
         form.reset();
         document.getElementById('prod_id').value = '';
         document.getElementById('modalTitle').textContent = 'Add New Product';
         modal.style.display = 'flex';
      });

      window.editProduct = (p) => {
         document.getElementById('prod_id').value = p.product_id;
         document.getElementById('prod_name').value = p.product_name;
         document.getElementById('prod_cat').value = p.category || '';
         document.getElementById('prod_price').value = p.price;
         document.getElementById('prod_barcode').value = p.barcode || '';
         document.getElementById('prod_min').value = p.minimum_stock;
         document.getElementById('prod_stock').value = p.stock_quantity;
         document.getElementById('modalTitle').textContent = 'Edit Product';
         modal.style.display = 'flex';
      };

      form.addEventListener('submit', async (e) => {
         e.preventDefault();
         const id = document.getElementById('prod_id').value;
         const data = {
             product_name: document.getElementById('prod_name').value,
             category: document.getElementById('prod_cat').value,
             price: document.getElementById('prod_price').value,
             barcode: document.getElementById('prod_barcode').value,
             minimum_stock: document.getElementById('prod_min').value
         };
         const qty = document.getElementById('prod_stock').value;

         try {
             if(id) {
                 await fetchAPI(`/products/${id}`, { method: 'PUT', body: JSON.stringify(data) });
                 await fetchAPI(`/inventory/${id}`, { method: 'PUT', body: JSON.stringify({ quantity: qty }) });
                 showToast('Product updated successfully', 'success');
             } else {
                 const res = await fetchAPI('/products', { method: 'POST', body: JSON.stringify(data) });
                 if(qty > 0) {
                     await fetchAPI(`/inventory/${res.product_id}`, { method: 'PUT', body: JSON.stringify({ quantity: qty }) });
                 }
                 showToast('Product created successfully', 'success');
             }
             modal.style.display = 'none';
             loadProducts();
         } catch(err) { showToast(err.message, 'error'); }
      });

      loadProducts();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Capstone POS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 450px;
      text-align: center;
    }
    .brand {
      margin-bottom: 2rem;
    }
    .brand h1 {
      font-size: 2.5rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="glass-card auth-card animate-fade-in">
      <div class="brand">
        <h1>POS Flow</h1>
        <p>Welcome back! Please login to your account.</p>
      </div>
      
      <form id="loginForm" style="text-align: left;">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" required placeholder="you@store.com">
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" required placeholder="••••••••">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fa-solid fa-right-to-bracket"></i> Sign In
        </button>
      </form>

      <div style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
        Are you a customer? <a href="signup.html">Create an account here</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // If already logged in, redirect
      if (isAuthenticated()) {
        const user = getAuthUser();
        if (user.role === 'customer') window.location.href = 'customer_account.html';
        else if (user.role === 'cashier') window.location.href = 'pos.html';
        else window.location.href = 'dashboard.html';
      }

      const loginForm = document.getElementById('loginForm');
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = e.target.querySelector('button');
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
        btn.disabled = true;

        try {
          const res = await fetchAPI('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });
          
          setAuthData(res.token, res.user);
          showToast('Login successful! Redirecting...', 'success');
          
          setTimeout(() => {
             // Redirect based on role
             if (res.user.role === 'customer') window.location.href = 'customer_account.html';
             else if (res.user.role === 'cashier') window.location.href = 'pos.html';
             else window.location.href = 'dashboard.html';
          }, 1000);
          
        } catch (error) {
          btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
          btn.disabled = false;
          showToast(error.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
